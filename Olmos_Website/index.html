<!DOCTYPE html>
<html class="doog" onclick="clickBody()">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Olmos Ensemble | United States</title>
        <style>
            @font-face {
                font-family: cominfL;
                src: url(fonts/CormorantInfant-Regular.ttf);
            }
            img {
                width: max(50%, 200px);
                display: block;
                height: auto;
                margin: 10vh auto 1vh;
                animation: fadeInAnimation ease 3s;
                animation-iteration-count: 1;
                animation-fill-mode: forwards;
            }
            p, a {
                color: white;
                display: block;
                font-size: max(2.6vw, 16px);
                text-align: center;
                font-family: cominfL;
                width: 60%;
                margin: 0 auto max(5vw, 40px);
                padding: 0;
                animation: fadeInAnimation ease 3s;
                animation-iteration-count: 1;
                animation-fill-mode: forwards;
            }
            a {
                color: #70bf44;
                transition: 0.3s;
                text-decoration: none;
            }
            a:hover {
                color: #faaa69;
                cursor: pointer;
                font-size: 2.2vw;
            }
            body {
                background-color: black;
            }
            @keyframes fadeInAnimation {
                0% {
                    opacity: 0;
                }
                100% {
                    opacity: 1;
                }
            }
            html {
                cursor: pointer;
                background-color: black;
            }
            #running {
                animation: fadeInAnimation ease 1s;
                animation-iteration-count: 1;
                animation-fill-mode: backwards;
                animation-direction: reverse;
            }
        </style>
    </head>
    <body class="boof">
        <img src="images/Olmos_Logo_Multicolor.jpg">
        <p>Honoring the tradition of chamber music in South Texas. Sharing our artistry with audiences across the region. Celebrating excellence in music through exciting and inspiring performances.</p>
        <a href="#"><em>Welcome to Season 26...</em></a>
    </body>
    <script>
        function clickBody() {
            fadeOutEffect();
            setTimeout(function(){ window.location.href = "about.html"; }, 1000);
            
        }
        function fadeOutEffect() {
            var fadeTarget = document.getElementsByClassName("boof")[0];
            var fadeEffect = setInterval(function () {
                if (!fadeTarget.style.opacity) {
                    fadeTarget.style.opacity = 1;
                }
                if (fadeTarget.style.opacity > 0) {
                    fadeTarget.style.opacity -= 0.01;
                } else {
                    clearInterval(fadeEffect);
                }
            }, 15);
            
        }
        document.getElementsByClassName("doog")[0].addEventListener('click', fadeOutEffect);
    </script>
</html>
